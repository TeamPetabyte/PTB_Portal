  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-for list=\"{{ cats }}\" as=\"c\" hint-placeholder-count=\"6\"><button class=\"nav {{ c.activeClass }}\" onclick=\"{{ c.onSelect }}\"><svg class=\"navico {{ c.colorClass }}\"><use href=\"#ic-{{ c.icon }}\"><\u002Fuse><\u002Fsvg><span class=\"lbl\">{{ c.label }}<\u002Fspan><span class=\"count\">{{ c.count }}<\u002Fspan><\u002Fbutton><\u002Fsc-for><div class=\"side-foot\"><div class=\"support\"><div class=\"support-t\">Need a new app?<\u002Fdiv><div class=\"support-p\">Request access or onboard a tool to the portal.<\u002Fdiv><span class=\"support-a\">Request access<svg class=\"ic14\"><use href=\"#ic-arrow\"><\u002Fuse><\u002Fsvg><\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Faside><div class=\"main\"><header class=\"topbar\"><div class=\"search\"><svg class=\"sico ic18\"><use href=\"#ic-search\"><\u002Fuse><\u002Fsvg><input type=\"text\" placeholder=\"Search apps, tools, services…\" value=\"{{ query }}\" onchange=\"{{ onSearch }}\" ref=\"{{ setSearchRef }}\"><span class=\"kbd\">⌘K<\u002Fspan><\u002Fdiv><div class=\"topright\"><button class=\"iconbtn\"><svg class=\"ic18\"><use href=\"#ic-bell\"><\u002Fuse><\u002Fsvg><span class=\"dot\"><\u002Fspan><\u002Fbutton><div class=\"userwrap\"><button class=\"userchip\" onclick=\"{{ toggleMenu }}\"><span class=\"avatar\">JL<\u002Fspan><span class=\"uname\">Jordan Lee<\u002Fspan><svg class=\"ic16\"><use href=\"#ic-chevron\"><\u002Fuse><\u002Fsvg><\u002Fbutton><sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"menu\"><div class=\"menu-h\"><span class=\"avatar lg\">JL<\u002Fspan><div><div class=\"menu-name\">Jordan Lee<\u002Fdiv><div class=\"menu-mail\">jordan.lee@petabyte.co<\u002Fdiv><\u002Fdiv><\u002Fdiv><button class=\"menu-i\"><svg class=\"ic18\"><use href=\"#ic-user\"><\u002Fuse><\u002Fsvg>Your profile<\u002Fbutton><button class=\"menu-i\"><svg class=\"ic18\"><use href=\"#ic-settings\"><\u002Fuse><\u002Fsvg>Settings<\u002Fbutton><div class=\"menu-div\"><\u002Fdiv><button class=\"menu-i danger\" onclick=\"{{ onSignOut }}\"><svg class=\"ic18\"><use href=\"#ic-logout\"><\u002Fuse><\u002Fsvg>Sign out<\u002Fbutton><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv><\u002Fheader><div class=\"content\"><div class=\"eyebrow\">{{ greeting }} · {{ dateStr }}<\u002Fdiv><h1 class=\"h-title\">{{ title }}<\u002Fh1><p class=\"h-sub\">{{ sub }}<\u002Fp><sc-if value=\"{{ hasApps }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"grid\"><sc-for list=\"{{ visibleApps }}\" as=\"app\" hint-placeholder-count=\"8\"><div class=\"card\" onclick=\"{{ app.onOpen }}\"><button class=\"fav {{ app.favClass }}\" onclick=\"{{ app.onFav }}\"><svg class=\"ic18\"><use href=\"#{{ app.starIcon }}\"><\u002Fuse><\u002Fsvg><\u002Fbutton><div class=\"tile {{ app.tileClass }}\"><svg class=\"ic24\"><use href=\"#ic-{{ app.icon }}\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div><div class=\"card-t\">{{ app.name }}<\u002Fdiv><\u002Fdiv><div class=\"card-d\">{{ app.desc }}<\u002Fdiv><div class=\"card-foot\"><span class=\"tag\">{{ app.catLabel }}<\u002Fspan><span class=\"open\">Open<svg class=\"ic14\"><use href=\"#ic-arrow\"><\u002Fuse><\u002Fsvg><\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"empty\"><div class=\"empty-ic\"><svg class=\"ic24\"><use href=\"#ic-search\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div class=\"empty-t\">No apps found<\u002Fdiv><div class=\"empty-p\">{{ emptyMsg }}<\u002Fdiv><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"toast\"><span class=\"tspin\"><\u002Fspan>{{ toast }}<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:860},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2f80d8&quot;,&quot;options&quot;:[&quot;#2f80d8&quot;,&quot;#134c7a&quot;,&quot;#0f766e&quot;,&quot;#4f46e5&quot;,&quot;#0f172a&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;comfortable&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { view:'login', query:'', cat:'all', favs:['sap','analytics','incident'], recent:['datahub','monitor','analytics','sap'], menuOpen:false, loading:null, toast:null };\n\n  apps = [\n    {id:'sap',name:'SAP ABAP Cloud',cat:'eng',icon:'code',desc:'ERP development and cloud ABAP runtime.'},\n    {id:'billing',name:'AI SaaS Billing',cat:'fin',icon:'billing',desc:'Usage-based invoicing for AI products.'},\n    {id:'datahub',name:'Internal Data Hub',cat:'data',icon:'data',desc:'Central catalog for datasets and pipelines.'},\n    {id:'monitor',name:'Server Monitor',cat:'ops',icon:'monitor',desc:'Real-time infrastructure health and alerts.'},\n    {id:'hr',name:'HR Workspace',cat:'ppl',icon:'people',desc:'Time off, payroll, and benefits.'},\n    {id:'docs',name:'DocsHub',cat:'eng',icon:'docs',desc:'Knowledge base and engineering runbooks.'},\n    {id:'expense',name:'Expense Center',cat:'fin',icon:'receipt',desc:'Submit, track, and approve expenses.'},\n    {id:'analytics',name:'Analytics Studio',cat:'data',icon:'analytics',desc:'Self-serve dashboards and BI reports.'},\n    {id:'incident',name:'Incident Manager',cat:'ops',icon:'incident',desc:'On-call schedules, incidents, postmortems.'},\n    {id:'access',name:'Access Manager',cat:'sec',icon:'shield',desc:'Provision roles and permissions.'},\n    {id:'registry',name:'Artifact Registry',cat:'eng',icon:'package',desc:'Internal package and image registry.'},\n    {id:'cloud',name:'Cloud Console',cat:'ops',icon:'cloud',desc:'Provision and manage cloud resources.'},\n    {id:'directory',name:'People Directory',cat:'ppl',icon:'directory',desc:'Org chart and employee directory.'},\n    {id:'revenue',name:'Revenue Insights',cat:'fin',icon:'revenue',desc:'ARR, churn, and forecast dashboards.'},\n  ];\n  catMeta = {eng:'Engineering',fin:'Finance',data:'Data',ops:'Operations',ppl:'People',sec:'Security'};\n  catIcon = {eng:'code',fin:'billing',data:'data',ops:'monitor',ppl:'people',sec:'shield'};\n\n  componentDidMount(){\n    this._key = (e)=>{\n      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); if(this._search) this._search.focus(); }\n      if(e.key==='Escape') this.setState({menuOpen:false});\n    };\n    window.addEventListener('keydown', this._key);\n  }\n  componentWillUnmount(){ window.removeEventListener('keydown', this._key); clearTimeout(this._t); clearTimeout(this._a); }\n\n  signIn(p){ this.setState({loading:p}); clearTimeout(this._a); this._a=setTimeout(()=>this.setState({view:'dashboard',loading:null}),1100); }\n  signOut(){ this.setState({view:'login',menuOpen:false,query:'',cat:'all',loading:null}); }\n  openApp(app){ const r=[app.id,...this.state.recent.filter(x=>x!==app.id)].slice(0,8); this.setState({recent:r,toast:'Opening '+app.name+'…'}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2200); }\n  toggleFav(id){ const has=this.state.favs.includes(id); this.setState({favs: has? this.state.favs.filter(x=>x!==id) : [...this.state.favs,id]}); }\n\n  renderVals(){\n    const s = this.state;\n    const accent = this.props.accent || '#2563eb';\n    const densityClass = (this.props.density==='compact') ? 'dense' : '';\n\n    const browseNav = [\n      {key:'all',label:'All Apps',icon:'grid',count:this.apps.length},\n      {key:'fav',label:'Favorites',icon:'star',count:s.favs.length},\n      {key:'recent',label:'Recently Used',icon:'clock',count:s.recent.length},\n    ].map(n=>({...n, activeClass: s.cat===n.key?'on':'', onSelect:()=>this.setState({cat:n.key})}));\n\n    const cats = Object.keys(this.catMeta).map(k=>({\n      key:k, label:this.catMeta[k], icon:this.catIcon[k], colorClass:'c-'+k,\n      count:this.apps.filter(a=>a.cat===k).length,\n      activeClass: s.cat===k?'on':'', onSelect:()=>this.setState({cat:k}),\n    }));\n\n    let base;\n    if(s.cat==='all') base=this.apps;\n    else if(s.cat==='fav') base=this.apps.filter(a=>s.favs.includes(a.id));\n    else if(s.cat==='recent') base=s.recent.map(id=>this.apps.find(a=>a.id===id)).filter(Boolean);\n    else base=this.apps.filter(a=>a.cat===s.cat);\n\n    const q = s.query.trim().toLowerCase();\n    const filtered = q ? base.filter(a=>(a.name+' '+a.desc+' '+this.catMeta[a.cat]).toLowerCase().includes(q)) : base;\n\n    const visibleApps = filtered.map(a=>{\n      const faved = s.favs.includes(a.id);\n      return {...a, catLabel:this.catMeta[a.cat], tileClass:'t-'+a.cat, favClass:faved?'on':'', starIcon:faved?'ic-star-f':'ic-star',\n        onOpen:()=>this.openApp(a),\n        onFav:(e)=>{ e.stopPropagation(); this.toggleFav(a.id); }};\n    });\n\n    let title, sub;\n    if(q){ title='Search results'; const n=visibleApps.length; sub=n+' result'+(n===1?'':'s')+' for “'+s.query.trim()+'”'; }\n    else if(s.cat==='all'){ title='All applications'; sub=this.apps.length+' apps available to you'; }\n    else if(s.cat==='fav'){ title='Favorites'; sub=s.favs.length+' pinned app'+(s.favs.length===1?'':'s'); }\n    else if(s.cat==='recent'){ title='Recently used'; sub='Your most recent '+visibleApps.length+' apps'; }\n    else { title=this.catMeta[s.cat]; const n=visibleApps.length; sub=n+' app'+(n===1?'':'s')+' in '+this.catMeta[s.cat]; }\n\n    const h=new Date().getHours();\n    const greeting=(h<12?'Good morning':h<18?'Good afternoon':'Good evening')+', Jordan';\n    const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});\n\n    const emptyMsg = q ? 'No apps match “'+s.query.trim()+'”. Try a different keyword or clear the search.' : 'There are no apps in this view yet.';\n\n    return {\n      isLogin: s.view==='login', isDash: s.view==='dashboard',\n      loadingG: s.loading==='google', idleG: s.loading!=='google', disableG: !!s.loading,\n      loadingM: s.loading==='microsoft', idleM: s.loading!=='microsoft', disableM: !!s.loading,\n      onGoogle:()=>this.signIn('google'), onMicrosoft:()=>this.signIn('microsoft'),\n      onSignOut:()=>this.signOut(),\n      accent, densityClass,\n      browseNav, cats, visibleApps,\n      hasApps: visibleApps.length>0, isEmpty: visibleApps.length===0, emptyMsg,\n      title, sub, greeting, dateStr,\n      query: s.query, onSearch:(e)=>this.setState({query:e.target.value}), setSearchRef:(el)=>{this._search=el;},\n      menuOpen: s.menuOpen, toggleMenu:()=>this.setState({menuOpen:!s.menuOpen}),\n      toast: s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
