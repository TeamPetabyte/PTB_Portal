*{box-sizing:border-box}
body{margin:0}
:root{--bg:#f4f6fa;--surface:#fff;--line:#e6eaf1;--line2:#eef1f6;--ink:#0f1729;--ink2:#5a6678;--ink3:#94a0b3;--accent:#2f80d8}
.ui{font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
.root{height:100vh;width:100%;overflow:hidden;background:var(--bg)}
.ic14{width:14px;height:14px;flex:none}.ic16{width:16px;height:16px;flex:none}.ic18{width:18px;height:18px;flex:none}.ic24{width:24px;height:24px;flex:none}.navico{width:18px;height:18px;flex:none}
.lhero{position:relative;height:100vh;overflow:hidden;background:radial-gradient(circle at 72% 42%,#eef5fc 0%,#fff 58%)}
.l3d{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.l3d-glow{position:absolute;width:780px;height:780px;right:-140px;top:50%;transform:translateY(-50%);border-radius:50%;background:radial-gradient(circle,rgba(47,128,216,.16),rgba(47,128,216,0) 65%)}
.hero-tile{position:absolute;right:13%;top:50%;width:min(17vw,220px);height:min(17vw,220px);display:flex;align-items:center;justify-content:center;animation:tfloat 9s ease-in-out infinite;filter:drop-shadow(0 24px 48px rgba(19,76,122,.22))}
.tile-mark{width:100%;height:100%;object-fit:contain}
@keyframes tfloat{0%,100%{transform:translateY(-54%) rotate(-6deg)}50%{transform:translateY(-59%) rotate(-3deg)}}
.chip{position:absolute;display:flex;align-items:center;justify-content:center;color:var(--accent);filter:drop-shadow(0 10px 18px rgba(19,76,122,.28))}
.chip svg{width:34px;height:34px}
.c4 svg{width:26px;height:26px}
.c1{right:30%;top:15%;animation:cf1 10s ease-in-out infinite}
.c2{right:4.5%;top:23%;color:#134c7a;animation:cf2 12s ease-in-out infinite}
.c3{right:28%;bottom:13%;color:#134c7a;animation:cf3 11s ease-in-out infinite}
.c4{right:6%;bottom:20%;animation:cf2 9s ease-in-out infinite}
@keyframes cf1{0%,100%{transform:translateY(0) rotate(6deg)}50%{transform:translateY(-20px) rotate(-2deg)}}
@keyframes cf2{0%,100%{transform:translateY(0)}50%{transform:translateY(16px)}}
@keyframes cf3{0%,100%{transform:translateY(0) rotate(-7deg)}50%{transform:translateY(-14px) rotate(-1deg)}}
.lnav{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;padding:11px 26px 11px 20px;background:none;border:none;box-shadow:none}
.lnav-brand{display:flex;align-items:center;gap:11px}
.lnav-name{font-size:13px;font-weight:800;letter-spacing:.22em;color:#0f1729}
.lmain{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;justify-content:center;padding:100px 76px 90px;max-width:900px}
.fx{transform:translateY(0)}
.l-over{font-size:12px;font-weight:700;letter-spacing:.24em;color:var(--accent);transition-delay:.1s}
.l-title{font-size:clamp(46px,6.2vw,84px);font-weight:600;letter-spacing:-.035em;line-height:1.04;color:#0f1729;margin:0;text-wrap:balance}
.l-p{font-size:18px;font-weight:400;line-height:1.65;color:var(--ink2);max-width:440px;margin:26px 0 0;transition-delay:.3s}
.l-cta{display:flex;align-items:center;gap:28px;margin-top:44px;transition-delay:.4s}
.l-ms{display:flex;align-items:center;gap:13px;background:#0a1220;color:#fff;border:none;border-radius:999px;padding:19px 30px;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.18em;cursor:pointer;transition:.2s}
.l-ms:hover{background:#16283f;transform:translateY(-1px);box-shadow:0 10px 30px -10px rgba(10,18,32,.5)}
.l-ms:disabled{opacity:.7;cursor:default;transform:none;box-shadow:none}
.l-lock{display:flex;align-items:center;gap:13px}
.l-lockcircle{width:52px;height:52px;border-radius:50%;background:#fff;box-shadow:0 4px 20px rgba(15,23,42,.09);display:flex;align-items:center;justify-content:center;color:var(--accent);flex:none;transition:.2s}
.l-lock:hover .l-lockcircle{transform:scale(1.05)}
.l-locktxt{font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--ink3);line-height:1.7}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.dash{display:grid;grid-template-columns:250px 1fr;height:100vh}
.side{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;overflow:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 4px}
.brand-mark{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex:none}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.02em}
.brand-tag{font-size:11px;color:var(--ink3);font-weight:600;letter-spacing:.02em;margin-top:-2px}
.navlabel{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);font-weight:700;padding:18px 10px 7px}
.nav{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;color:var(--ink2);font-weight:600;font-size:14px;border:none;background:none;width:100%;text-align:left;transition:.13s;font-family:inherit;letter-spacing:-.01em}
.nav:hover{background:#f4f6fa;color:var(--ink)}
.nav.on{background:color-mix(in srgb,var(--accent) 11%,#fff);color:var(--accent)}
.nav .lbl{flex:1}
.count{font-size:12px;color:var(--ink3);font-weight:600;background:#f1f4f9;padding:1px 8px;border-radius:999px}
.nav.on .count{background:color-mix(in srgb,var(--accent) 18%,#fff);color:var(--accent)}
.side-foot{margin-top:auto;padding-top:18px}
.support{background:linear-gradient(160deg,#f6f8fb,#eef2f8);border:1px solid var(--line2);border-radius:13px;padding:15px}
.support-t{font-size:13.5px;font-weight:700}
.support-p{font-size:12.5px;color:var(--ink2);margin-top:4px;line-height:1.45}
.support-a{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent);margin-top:11px;cursor:pointer}
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{height:66px;flex:none;display:flex;align-items:center;gap:16px;padding:0 28px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.82);backdrop-filter:blur(10px);z-index:5}
.search{position:relative;flex:1;max-width:540px}
.search input{width:100%;height:43px;border:1px solid var(--line);border-radius:12px;background:#f5f7fb;padding:0 64px 0 42px;font:inherit;font-size:14px;color:var(--ink);outline:none;transition:.15s;letter-spacing:-.01em}
.search input::placeholder{color:var(--ink3)}
.search input:focus{background:#fff;border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 16%,#fff)}
.sico{position:absolute;left:13px;top:12px;color:var(--ink3)}
.kbd{position:absolute;right:11px;top:11px;font-size:11px;font-weight:700;color:var(--ink3);background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 7px;letter-spacing:.02em}
.topright{margin-left:auto;display:flex;align-items:center;gap:10px}

.h-sub{color:var(--ink2);font-size:14.5px;margin:5px 0 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:16px;margin-top:24px}

.card:hover{border-color:#cdd7e7;box-shadow:0 12px 30px -16px rgba(15,23,42,.3);transform:translateY(-3px)}

 }}"></div><div class="l3d"><div class="par" ref="{{ setParA }}"><div class="l3d-glow"></div></div><div class="par" ref="{{ setParB }}"><div class="hero-tile"><img class="tile-mark" src="../public/petabyte-mark-hd.png" alt=""></div></div><div class="par" ref="{{ setParA }}"><div class="chip c1"><svg class="ic24"><use href="#ic-data"></use></svg></div><div class="chip c2"><svg class="ic24"><use href="#ic-monitor"></use></svg></div><div class="chip c3"><svg class="ic24"><use href="#ic-shield"></use></svg></div><div class="chip c4"><svg class="ic18"><use href="#ic-cloud"></use></svg></div></div></div><header class="lnav"><div class="lnav-brand"><span class="markimg" role="img" aria-label="Petabyte" style="width:30px;height:30px"></span><span class="lnav-name">PETABYTE</span></div></header><main class="lmain"><h1 class="l-title fx">{{ typedTitle }}<span class="caret {{ caretClass }}"></span></h1><p class="l-p fx">Sign in once with your Microsoft account and launch every app your team depends on — from a single, secure hub.</p><div class="l-cta fx"><button class="l-ms" disabled="{{ disableM }}" sc-camel-on-click="{{ onMicrosoft }}" sc-camel-on-mouse-move="{{ onMagnet }}" sc-camel-on-mouse-leave="{{ onMagnetLeave }}"><sc-if value="{{ loadingM }}" hint-placeholder-val="{{ false }}"><svg class="ic18 spin" sc-camel-view-box="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2.5" stroke-dasharray="40 60" stroke-linecap="round"></circle></svg></sc-if><sc-if value="{{ idleM }}" hint-placeholder-val="{{ true }}"><svg class="ic16" sc-camel-view-box="0 0 23 23"><path fill="#F25022" d="M1 1h10v10H1z"></path><path fill="#7FBA00" d="M12 1h10v10H12z"></path><path fill="#00A4EF" d="M1 12h10v10H1z"></path><path fill="#FFB900" d="M12 12h10v10H12z"></path></svg></sc-if>SIGN IN WITH MICROSOFT<svg class="ic14"><use href="#ic-arrow"></use></svg></button><div class="l-lock"><span class="l-lockcircle"><svg class="ic18"><use href="#ic-lock"></use></svg></span><span class="l-locktxt">SSO PROTECTED<br>@PETABYTE.CO ONLY</span></div></div></main></div></sc-if><sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}"><div class="toast"><span class="tspin"></span>{{ toast }}</div></sc-if></div>
</x-dc>
<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:860},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2f80d8&quot;,&quot;options&quot;:[&quot;#2f80d8&quot;,&quot;#134c7a&quot;,&quot;#0f766e&quot;,&quot;#4f46e5&quot;,&quot;#0f172a&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;comfortable&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { view:'login', query:'', cat:'all', favs:['sap','analytics','incident'], recent:['datahub','monitor','analytics','sap'], menuOpen:false, loading:null, toast:null, heroIn:false, typedN:0, paletteOpen:false, palQuery:'', palIndex:0, theme:'light', leaving:false, dragId:null, overId:null, statuses:{monitor:'deg',registry:'down'} };

  apps = [
    {id:'sap',name:'SAP ABAP Cloud',cat:'eng',icon:'code',desc:'ERP development and cloud ABAP runtime.'},
    {id:'billing',name:'AI SaaS Billing',cat:'fin',icon:'billing',desc:'Usage-based invoicing for AI products.'},
    {id:'datahub',name:'Internal Data Hub',cat:'data',icon:'data',desc:'Central catalog for datasets and pipelines.'},
    {id:'monitor',name:'Server Monitor',cat:'ops',icon:'monitor',desc:'Real-time infrastructure health and alerts.'},
    {id:'hr',name:'HR Workspace',cat:'ppl',icon:'people',desc:'Time off, payroll, and benefits.'},
    {id:'docs',name:'DocsHub',cat:'eng',icon:'docs',desc:'Knowledge base and engineering runbooks.'},
    {id:'expense',name:'Expense Center',cat:'fin',icon:'receipt',desc:'Submit, track, and approve expenses.'},
    {id:'analytics',name:'Analytics Studio',cat:'data',icon:'analytics',desc:'Self-serve dashboards and BI reports.'},
    {id:'incident',name:'Incident Manager',cat:'ops',icon:'incident',desc:'On-call schedules, incidents, postmortems.'},
    {id:'access',name:'Access Manager',cat:'sec',icon:'shield',desc:'Provision roles and permissions.'},
    {id:'registry',name:'Artifact Registry',cat:'eng',icon:'package',desc:'Internal package and image registry.'},
    {id:'cloud',name:'Cloud Console',cat:'ops',icon:'cloud',desc:'Provision and manage cloud resources.'},
    {id:'directory',name:'People Directory',cat:'ppl',icon:'directory',desc:'Org chart and employee directory.'},
    {id:'revenue',name:'Revenue Insights',cat:'fin',icon:'revenue',desc:'ARR, churn, and forecast dashboards.'},
  ];
  catMeta = {eng:'Engineering',fin:'Finance',data:'Data',ops:'Operations',ppl:'People',sec:'Security'};
  catIcon = {eng:'code',fin:'billing',data:'data',ops:'monitor',ppl:'people',sec:'shield'};

  titleText = 'Every internal tool\nOne front door';
  componentDidMount(){
    this._key = (e)=>{
      if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); if(this.state.view==='dashboard') this.openPalette(); }
      if(e.key==='Escape') this.setState({menuOpen:false,paletteOpen:false});
    };
    window.addEventListener('keydown', this._key);
    this._h=setTimeout(()=>this.setState({heroIn:true}),80);
    try{ const th=localStorage.getItem('ptb_theme_v1'); if(th==='dark'||th==='light') this.setState({theme:th}); }catch(e){}
    this.startTyping();
    this._st=setInterval(()=>{
      const pool=['op','op','op','op','deg','down'];
      const a=this.apps[Math.floor(Math.random()*this.apps.length)];
      const next=pool[Math.floor(Math.random()*pool.length)];
      const st={...this.state.statuses}; if(next==='op') delete st[a.id]; else st[a.id]=next;
      this.setState({statuses:st});
    },7000);
  }
  componentWillUnmount(){ window.removeEventListener('keydown', this._key); clearTimeout(this._t); clearTimeout(this._a); clearTimeout(this._h); clearInterval(this._ty); clearInterval(this._st); clearTimeout(this._lv); }
  startTyping(){ clearInterval(this._ty); this.setState({typedN:0}); this._ty=setInterval(()=>{ const n=this.state.typedN+1; this.setState({typedN:n}); if(n>=this.titleText.length) clearInterval(this._ty); },42); }
  openPalette(){ this.setState({paletteOpen:true,palQuery:'',palIndex:0}); setTimeout(()=>{ if(this._pal) this._pal.focus(); },30); }
  palList(){ const q=this.state.palQuery.trim().toLowerCase(); return q? this.apps.filter(a=>(a.name+' '+a.desc+' '+this.catMeta[a.cat]).toLowerCase().includes(q)) : this.apps; }

  signIn(p){ this.setState({loading:p}); clearTimeout(this._a); this._a=setTimeout(()=>{ this.setState({loading:null,toast:'Redirecting to Microsoft Entra ID…'}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2400); },900); }
  signOut(){ clearTimeout(this._h); this.setState({view:'login',menuOpen:false,query:'',cat:'all',loading:null,heroIn:false,paletteOpen:false}); this._h=setTimeout(()=>this.setState({heroIn:true}),80); this.startTyping(); }
  openApp(app){ const r=[app.id,...this.state.recent.filter(x=>x!==app.id)].slice(0,8); this.setState({recent:r,toast:'Opening '+app.name+'…'}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),2200); }
  toggleFav(id){ const has=this.state.favs.includes(id); this.setState({favs: has? this.state.favs.filter(x=>x!==id) : [...this.state.favs,id]}); }

  renderVals(){
    const s = this.state;
    const accent = this.props.accent || '#2f80d8';
    const densityClass = (this.props.density==='compact') ? 'dense' : '';

    const browseNav = [
      {key:'all',label:'All Apps',icon:'grid',count:this.apps.length},
      {key:'fav',label:'Favorites',icon:'star',count:s.favs.length},
      {key:'recent',label:'Recently Used',icon:'clock',count:s.recent.length},
    ].map(n=>({...n, activeClass: s.cat===n.key?'on':'', onSelect:()=>this.setState({cat:n.key})}));

    const cats = Object.keys(this.catMeta).map(k=>({
      key:k, label:this.catMeta[k], icon:this.catIcon[k], colorClass:'c-'+k,
      count:this.apps.filter(a=>a.cat===k).length,
      activeClass: s.cat===k?'on':'', onSelect:()=>this.setState({cat:k}),
    }));

    let base;
    if(s.cat==='all') base=this.apps;
    else if(s.cat==='fav') base=s.favs.map(id=>this.apps.find(x=>x.id===id)).filter(Boolean);
    else if(s.cat==='recent') base=s.recent.map(id=>this.apps.find(a=>a.id===id)).filter(Boolean);
    else base=this.apps.filter(a=>a.cat===s.cat);

    const q = s.query.trim().toLowerCase();
    const filtered = q ? base.filter(a=>(a.name+' '+a.desc+' '+this.catMeta[a.cat]).toLowerCase().includes(q)) : base;

    const stName={op:'Operational',deg:'Degraded',down:'Down'};
    const visibleApps = filtered.map(a=>{
      const faved = s.favs.includes(a.id);
      const stKey = s.statuses[a.id]||'op';
      return {...a, catLabel:this.catMeta[a.cat], tileClass:'t-'+a.cat, favClass:faved?'on':'', starIcon:faved?'ic-star-f':'ic-star',
        stClass:'st-'+stKey, stLabel:stName[stKey],
        overClass:(s.overId===a.id&&s.dragId)?'dragover':'',
        draggable: s.cat==='fav'&&!q,
        onOpen:()=>this.openApp(a),
        onFav:(e)=>{ e.stopPropagation(); this.toggleFav(a.id); },
        onTilt:(e)=>{ const el=e.currentTarget; const r=el.getBoundingClientRect(); const nx=(e.clientX-r.left)/r.width-.5, ny=(e.clientY-r.top)/r.height-.5; el.style.transform='translateY(-3px) rotateX('+(ny*-6)+'deg) rotateY('+(nx*6)+'deg)'; },
        onTiltLeave:(e)=>{ e.currentTarget.style.transform=''; },
        onDragStart:(e)=>{ this.setState({dragId:a.id}); try{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',a.id); }catch(err){} },
        onDragOver:(e)=>{ if(this.state.dragId && this.state.dragId!==a.id){ e.preventDefault(); if(this.state.overId!==a.id) this.setState({overId:a.id}); } },
        onDrop:(e)=>{ e.preventDefault(); const from=this.state.dragId; if(!from||from===a.id) return; const f=this.state.favs.filter(x=>x!==from); f.splice(f.indexOf(a.id),0,from); this.setState({favs:f,dragId:null,overId:null}); },
        onDragEnd:()=>{ this.setState({dragId:null,overId:null}); },
      };
    });

    let title, sub;
    if(q){ title='Search results'; const n=visibleApps.length; sub=n+' result'+(n===1?'':'s')+' for “'+s.query.trim()+'”'; }
    else if(s.cat==='all'){ title='All applications'; sub=this.apps.length+' apps available to you'; }
    else if(s.cat==='fav'){ title='Favorites'; sub=s.favs.length+' pinned app'+(s.favs.length===1?'':'s'); }
    else if(s.cat==='recent'){ title='Recently used'; sub='Your most recent '+visibleApps.length+' apps'; }
    else { title=this.catMeta[s.cat]; const n=visibleApps.length; sub=n+' app'+(n===1?'':'s')+' in '+this.catMeta[s.cat]; }

    const h=new Date().getHours();
    const greeting=(h<12?'Good morning':h<18?'Good afternoon':'Good evening')+', Jordan';
    const dateStr=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

    const emptyMsg = q ? 'No apps match “'+s.query.trim()+'”. Try a different keyword or clear the search.' : 'There are no apps in this view yet.';

    const spotMove=(e)=>{ const host=e.currentTarget; const r=host.getBoundingClientRect();
      if(this._spot){ this._spot.style.left=(e.clientX-r.left)+'px'; this._spot.style.top=(e.clientY-r.top)+'px'; }
      const nx=(e.clientX-r.left)/r.width-0.5, ny=(e.clientY-r.top)/r.height-0.5;
      if(this._parA) this._parA.forEach(el=>{ el.style.transform='translate('+(nx*-14)+'px,'+(ny*-10)+'px)'; });
      if(this._parB) this._parB.style.transform='translate('+(nx*-30)+'px,'+(ny*-22)+'px)';
    };
    const spotLeave=()=>{ if(this._parA) this._parA.forEach(el=>{ el.style.transform=''; }); if(this._parB) this._parB.style.transform=''; };
    const palApps = this.palList().map((a,i)=>({ ...a, catLabel:this.catMeta[a.cat], tileClass:'t-'+a.cat, onClass: i===s.palIndex?'on':'',
      onPick:()=>{ this.setState({paletteOpen:false}); this.openApp(a); },
      onHover:()=>{ if(this.state.palIndex!==i) this.setState({palIndex:i}); } }));

    return {
      isLogin: s.view==='login', isDash: s.view==='dashboard',
      loadingM: s.loading==='microsoft', idleM: s.loading!=='microsoft', disableM: !!s.loading,
      onMicrosoft:()=>this.signIn('microsoft'), heroInClass: s.heroIn?'hin':'',
      onSignOut:()=>this.signOut(),
      accent, densityClass,
      browseNav, cats, visibleApps,
      hasApps: visibleApps.length>0, isEmpty: visibleApps.length===0, emptyMsg,
      title, sub, greeting, dateStr,
      query: s.query, onSearch:(e)=>this.setState({query:e.target.value}), setSearchRef:(el)=>{this._search=el;},
      menuOpen: s.menuOpen, toggleMenu:()=>this.setState({menuOpen:!s.menuOpen}),
      toast: s.toast,
      typedTitle: this.titleText.slice(0,s.typedN),
      caretClass: s.typedN>=this.titleText.length?'off':'',
      leaveClass: s.leaving?'leave':'',
      onHeroMouse: spotMove, onHeroLeave: spotLeave,
      setSpot:(el)=>{ this._spot=el; },
      setParA:(el)=>{ if(el){ this._parA=this._parA||new Set(); this._parA.add(el); } },
      setParB:(el)=>{ this._parB=el; },
      onMagnet:(e)=>{ const el=e.currentTarget; const r=el.getBoundingClientRect(); const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2); el.style.transform='translate('+(dx*.12)+'px,'+(dy*.18)+'px)'; },
      onMagnetLeave:(e)=>{ e.currentTarget.style.transform=''; },
      themeClass: s.theme==='dark'?'dark':'', isDark: s.theme==='dark', isLight: s.theme!=='dark',
      toggleTheme:()=>{ const t=s.theme==='dark'?'light':'dark'; this.setState({theme:t}); try{ localStorage.setItem('ptb_theme_v1', t); }catch(e){} },
      paletteOpen: s.paletteOpen,
      closePalette:()=>this.setState({paletteOpen:false}),
      stopProp:(e)=>e.stopPropagation(),
      palQuery: s.palQuery,
      onPalQuery:(e)=>this.setState({palQuery:e.target.value,palIndex:0}),
      onPalKey:(e)=>{ const list=this.palList(); if(e.key==='ArrowDown'){ e.preventDefault(); this.setState({palIndex:Math.min(list.length-1,this.state.palIndex+1)}); } else if(e.key==='ArrowUp'){ e.preventDefault(); this.setState({palIndex:Math.max(0,this.state.palIndex-1)}); } else if(e.key==='Enter'){ const a=list[this.state.palIndex]; if(a){ this.setState({paletteOpen:false}); this.openApp(a); } } },
      setPalRef:(el)=>{ this._pal=el; },
      palApps, palEmpty: palApps.length===0,
    };
  }
}
</script>
